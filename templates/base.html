<!DOCTYPE html>
<html>
<head>
    <title>Budget Planning App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav style="background:#333; padding:10px; display:flex; justify-content:space-between; align-items:center;">
  
  <!-- LEFT SIDE -->
  <div>
    <a href="{{ url_for('home') }}" style="color:white; margin-right:15px;">Home</a>

    {% if session.get('user_id') %}
      <a href="{{ url_for('dashboard') }}" style="color:white; margin-right:15px;">Dashboard</a>
    {% endif %}
  </div>

  <!-- RIGHT SIDE -->
  <div>
    {% if session.get('user_id') %}
      <a href="{{ url_for('logout') }}" 
         style="color:white; background:#e74c3c; padding:6px 12px; border-radius:4px; text-decoration:none;">
         Logout
      </a>
    {% else %}
      <a href="{{ url_for('login') }}" style="color:white; margin-right:15px;">Login</a>
      <a href="{{ url_for('register') }}" style="color:white;">Register</a>
    {% endif %}
  </div>

</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
